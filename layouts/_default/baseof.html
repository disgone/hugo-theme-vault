<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta http-equiv="content-type" content="text/html; charset=utf-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ .Description | default .Site.Params.description }}">
    <title>{{ block "title" . }}{{ .Site.Title }}{{ end }}</title>
    {{ partial "head/includes" . }}
    <style>
        html{background-color:#fff;font-size:16px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Fira Sans','Droid Sans','Helvetica Neue',Arial,sans-serif}
        body{background-color:#fff;color:#000;font-family:'PT Serif',Georgia,'Times New Roman',Times,serif;line-height:1.6;margin:0}
        .content-grid{display:grid;grid-template-rows:auto 1fr auto;min-height:100vh}
        #site-header{font-family:'Roboto Condensed',Arial,sans-serif;text-align:center;text-transform:uppercase;padding:1em}
        #site-header li{display:inline;padding:0 .25rem}
        main{padding:1em 1em 2em}
        a{color:#0066cc;text-decoration:none}
        a:hover{color:#0052a3}
    </style>
</head>
<body>
    <div class="content-grid">
        {{ partial "header.html" . }}
        <main class="viewport">
            {{ block "main" . }}
            {{ end }}
        </main>
        <footer id="site-footer">
            <div class="viewport">
                {{ block "footer" . }}
                {{ end }}
                <p class='copyright'>&copy; {{ default "2026" .Site.Params.copyright_year }} {{ .Site.Title }}</p>
            </div>
        </footer>
    </div>
    {{ $syntaxCss := resources.Get "scss/syntax.scss" | toCSS | postCSS | fingerprint }}
    <link rel="stylesheet" href="{{ $syntaxCss.RelPermalink }}" media="screen" integrity="{{ $syntaxCss.Data.Integrity }}" crossorigin="anonymous">
</body>
</html>
