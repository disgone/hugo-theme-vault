{{ define "title" }}
    {{ .Title | markdownify }} {{ .Site.Params.tokenSeparator | markdownify }} {{ .Site.Title }}
{{ end }}

{{ define "main" }}
<article class='page'>
    <header>
        <h1>{{ .Title }}</h1>
        {{ with .Description }}
        <p class='description'>{{ . }}</p>
        {{ end }}
    </header>
    {{ .Content }}
</article>
{{ end }}
