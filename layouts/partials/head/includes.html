<!-- Preconnect to own domain -->
<link rel="preconnect" href="{{ .Site.BaseURL }}" crossorigin>

<!-- Preload critical fonts -->
<link rel="preload" href="{{ .Site.BaseURL }}fonts/Geist-Variable.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ .Site.BaseURL }}fonts/GeistMono-Variable.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ .Site.BaseURL }}fonts/pt-serif-v17-latin-regular.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ .Site.BaseURL }}fonts/Outfit-Regular.woff2" as="font" type="font/woff2" crossorigin>

<link rel="icon" href="{{ .Site.Params.assets.favicon | default "favicon.ico" | absURL }}">
<link rel="canonical" href="{{ .Permalink }}">

{{ with .OutputFormats.Get "RSS" }}
<link href="{{ .RelPermalink }}" rel="alternate" type="application/rss+xml">
{{ end }}

{{ $css := resources.Get "scss/main.scss" | toCSS | fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}" integrity="{{ $css.Data.Integrity }}" crossorigin="anonymous">
<script>if(localStorage.getItem("theme")==="dark")document.documentElement.classList.add("dark")</script>
