<nav role="navigation" aria-label="Primary navigation">
    <ul>
        {{ range $.Site.Menus.main }}
        <li>
            <a href="{{ .URL }}" title="{{ .Title | default .Name  }}">{{ .Name }}</a>
        </li>
        {{ end }}
        <li>
            <div class="theme-selector">
                <button type="button" class="theme-btn" aria-label="Select theme" aria-haspopup="true">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <ul class="theme-list">
                    <li><button type="button" data-theme="light">Light</button></li>
                    <li><button type="button" data-theme="dark">Dark</button></li>
                </ul>
            </div>
        </li>
    </ul>
</nav>

<style>
.theme-selector {
    position: relative;
    display: inline-block;
}

.theme-btn {
    background: none;
    border: none;
    color: var(--color-text);
    cursor: pointer;
    padding: 0 .25rem;
}

.theme-list {
    background-color: var(--color-bg);
    border: 1px solid var(--color-border-light);
    border-radius: 4px;
    color: var(--color-text);
    display: none;
    list-style: none;
    margin: 0;
    padding: 0.5rem 0;
    position: absolute;
    right: 0;
    top: 100%;
    z-index: 100;
}

.theme-list.open {
    display: block;
}

.theme-list li {
    padding: 0;
}

.theme-list button {
    background: none;
    border: none;
    color: var(--color-text);
    cursor: pointer;
    padding: 0.25rem 1rem;
    text-align: left;
    width: 100%;
}

.theme-list button:hover {
    background-color: var(--color-bg-alt);
    color: var(--color-primary);
}
</style>

<script>
(function() {
    var selector = document.querySelector('.theme-selector');
    var btn = selector.querySelector('.theme-btn');
    var list = selector.querySelector('.theme-list');
    var html = document.documentElement;

    btn.addEventListener('click', function(e) {
        e.stopPropagation();
        list.classList.toggle('open');
    });

    document.addEventListener('click', function() {
        list.classList.remove('open');
    });

    list.addEventListener('click', function(e) {
        var themeBtn = e.target.closest('[data-theme]');
        if (themeBtn) {
            var theme = themeBtn.dataset.theme;
            html.className = theme;
            localStorage.setItem('theme', theme);
            list.classList.remove('open');
        }
    });
})();
</script>
