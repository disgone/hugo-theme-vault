<figure class="{{ default "normal" (.Get "variant") }}">
    {{- $src := .Get "src" -}}
    {{- $width := .Get "width" -}}
    {{- $height := .Get "height" -}}
    {{- $eager := .Get "eager" -}}

    {{/* Auto-detect dimensions for local images if not provided */}}
    {{- $img := resources.Get $src -}}
    {{- if and $img $width $height -}}
        {{- $width = $img.Width -}}
        {{- $height = $img.Height -}}
    {{- end -}}

    {{ if $eager }}
        <img
            src="{{ $src }}"
            alt="{{ .Get "title" }}"
            width="{{ $width }}"
            height="{{ $height }}"
            loading="eager">
    {{ else }}
        <img
            src="{{ $src }}"
            alt="{{ .Get "title" }}"
            width="{{ $width }}"
            height="{{ $height }}"
            loading="lazy">
    {{ end }}
	<figcaption>
        <p>{{ .Get "title" | markdownify }}</p>
    </figcaption>
</figure>
