<figure class="{{ default "normal" (.Get "variant") }}">
    {{ if .Get "eager" }}
        <img src="{{ .Get "src" }}" alt="{{ .Get "title" }}" loading="eager">
    {{ else }}
        <img src="{{ .Get "src" }}" alt="{{ .Get "title" }}" loading="lazy">
    {{ end }}
	<figcaption>
        <p>{{ .Get "title" | markdownify }}</p>
    </figcaption>
</figure>
